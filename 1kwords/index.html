<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1000 Words — Inglés por Niveles</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #09090e;
        --s1: #0d0d14;
        --s2: #13131e;
        --s3: #1a1a28;
        --s4: #222236;
        --border: #2a2a42;
        --border2: #383858;
        --l1: #52e0a0;
        --l2: #40b8f0;
        --l3: #a87fff;
        --l4: #ff9f5a;
        --l5: #ff6b8a;
        --gold: #f0c040;
        --text: #e8e8f2;
        --text2: #a0a0c0;
        --text3: #606080;
        --white: #fff;
        --green: #4ade80;
        --red: #f87171;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ─── SIDEBAR ─── */
      #sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: 240px;
        background: var(--s1);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        z-index: 100;
        overflow-y: auto;
        transition: transform 0.3s;
      }
      .sidebar-logo {
        padding: 24px 20px 16px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-logo .lg-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--gold);
        letter-spacing: -0.5px;
        line-height: 1;
      }
      .sidebar-logo .lg-sub {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.6rem;
        color: var(--text3);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 4px;
      }
      .nav-section {
        padding: 14px 14px 6px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.58rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text3);
      }
      .nav-level-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 20px;
        cursor: pointer;
        background: none;
        border: none;
        width: 100%;
        text-align: left;
        transition: background 0.2s;
        border-left: 3px solid transparent;
      }
      .nav-level-btn:hover {
        background: var(--s3);
      }
      .nav-level-btn.active {
        background: var(--s3);
      }
      .nav-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .nav-label {
        font-family: "DM Sans", sans-serif;
        font-size: 0.82rem;
        font-weight: 500;
        color: var(--text2);
        flex: 1;
      }
      .nav-level-btn.active .nav-label {
        color: var(--text);
      }
      .nav-count {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.62rem;
        color: var(--text3);
      }
      .nav-divider {
        height: 1px;
        background: var(--border);
        margin: 8px 14px;
      }
      .sidebar-footer {
        margin-top: auto;
        padding: 16px 20px;
        border-top: 1px solid var(--border);
      }
      .progress-bar-wrap {
        background: var(--s3);
        height: 4px;
        border-radius: 2px;
        margin-top: 8px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--l1), var(--l2));
        border-radius: 2px;
        transition: width 0.5s ease;
      }
      .progress-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.65rem;
        color: var(--text3);
      }

      /* Sub-level nav inside sidebar */
      .subnav {
        display: none;
        flex-direction: column;
        background: var(--s2);
        border-bottom: 1px solid var(--border);
      }
      .subnav.open {
        display: flex;
      }
      .subnav-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 20px 8px 36px;
        cursor: pointer;
        background: none;
        border: none;
        width: 100%;
        text-align: left;
        transition: background 0.15s;
        border-left: 3px solid transparent;
      }
      .subnav-btn:hover {
        background: var(--s3);
      }
      .subnav-btn.active {
        background: var(--s3);
        border-left-color: var(--gold);
      }
      .subnav-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.68rem;
        color: var(--text3);
      }
      .subnav-btn.active .subnav-label {
        color: var(--text2);
      }

      #menuBtn {
        display: none;
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 200;
        background: var(--s2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        width: 40px;
        height: 40px;
        font-size: 1.1rem;
        cursor: pointer;
        align-items: center;
        justify-content: center;
      }
      #main {
        margin-left: 240px;
        min-height: 100vh;
        transition: margin 0.3s;
      }
      .level-panel {
        display: none;
      }
      .level-panel.active {
        display: block;
      }
      .sublevel-panel {
        display: none;
      }
      .sublevel-panel.active {
        display: block;
      }

      /* ─── LEVEL HERO ─── */
      .level-hero {
        padding: 40px 48px 32px;
        border-bottom: 1px solid var(--border);
        position: relative;
        overflow: hidden;
      }
      .level-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 14px;
        border-radius: 20px;
        border: 1px solid;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 1px;
        margin-bottom: 16px;
      }
      .level-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 2.6rem;
        font-weight: 700;
        line-height: 1.1;
        margin-bottom: 8px;
      }
      .level-desc {
        font-size: 0.95rem;
        color: var(--text2);
        max-width: 560px;
        line-height: 1.6;
      }
      .level-meta {
        display: flex;
        gap: 24px;
        margin-top: 18px;
        flex-wrap: wrap;
      }
      .meta-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.72rem;
        color: var(--text3);
      }
      .meta-item span {
        font-size: 1rem;
      }

      /* Sub-level nav tabs */
      .sublevel-tabs {
        display: flex;
        gap: 8px;
        padding: 20px 48px 0;
        flex-wrap: wrap;
        border-bottom: 1px solid var(--border);
        background: var(--s1);
      }
      .slvl-tab {
        padding: 10px 18px;
        border-radius: 8px 8px 0 0;
        cursor: pointer;
        border: 1px solid var(--border);
        border-bottom: none;
        background: var(--s2);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        color: var(--text3);
        transition: all 0.2s;
        margin-bottom: -1px;
      }
      .slvl-tab:hover {
        background: var(--s3);
        color: var(--text2);
      }
      .slvl-tab.active {
        background: var(--bg);
        color: var(--text);
        border-color: var(--border2);
      }

      .content-area {
        padding: 32px 48px 80px;
        max-width: 1300px;
      }
      .section-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
      }
      .section-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        color: var(--text3);
        background: var(--s3);
        padding: 3px 9px;
        border-radius: 4px;
        letter-spacing: 1px;
      }
      .section-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.3rem;
        font-weight: 600;
        color: var(--text);
      }

      /* ─── WORD GRID ─── */
      .word-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 14px;
        margin-bottom: 40px;
      }
      .wcard {
        background: var(--s2);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          transform 0.15s;
        position: relative;
      }
      .wcard-accent {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
      }
      .wcard:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
      }
      .wcard.open {
        border-color: rgba(240, 192, 64, 0.35);
      }
      .wcard.open .wcard-accent {
        background: var(--gold) !important;
      }
      .wcard-top {
        padding: 16px 16px 14px 20px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }
      .wcard-info {
        flex: 1;
      }
      .wcard-word {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.55rem;
        font-weight: 700;
        color: var(--text);
        line-height: 1.1;
      }
      .wcard-meta {
        display: flex;
        gap: 6px;
        margin-top: 5px;
        align-items: center;
        flex-wrap: wrap;
      }
      .tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.58rem;
        padding: 2px 7px;
        border-radius: 4px;
        border: 1px solid;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .tag-noun {
        color: #f9ca24;
        border-color: rgba(249, 202, 36, 0.3);
        background: rgba(249, 202, 36, 0.06);
      }
      .tag-verb {
        color: #a29bfe;
        border-color: rgba(162, 155, 254, 0.3);
        background: rgba(162, 155, 254, 0.06);
      }
      .tag-adj {
        color: #55efc4;
        border-color: rgba(85, 238, 196, 0.3);
        background: rgba(85, 238, 196, 0.06);
      }
      .tag-adv {
        color: #fd79a8;
        border-color: rgba(253, 121, 168, 0.3);
        background: rgba(253, 121, 168, 0.06);
      }
      .tag-fn {
        color: #74b9ff;
        border-color: rgba(116, 185, 255, 0.3);
        background: rgba(116, 185, 255, 0.06);
      }
      .tag-past {
        color: #81ecec;
        border-color: rgba(129, 236, 236, 0.25);
        background: rgba(129, 236, 236, 0.05);
      }
      .wcard-es {
        font-size: 0.88rem;
        color: var(--gold);
        margin-top: 6px;
        font-weight: 600;
      }
      .wcard-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 7px;
      }
      .rank-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.6rem;
        color: var(--text3);
        background: var(--s3);
        padding: 2px 7px;
        border-radius: 3px;
        border: 1px solid var(--border);
      }
      .waud-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--s3);
        border: 1px solid var(--border2);
        color: var(--text2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .waud-btn:hover {
        background: var(--s4);
        color: var(--text);
        transform: scale(1.1);
      }
      .waud-btn.playing {
        background: var(--gold);
        border-color: var(--gold);
        color: var(--bg);
        animation: pulse 0.8s infinite;
      }
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(240, 192, 64, 0.5);
        }
        70% {
          box-shadow: 0 0 0 7px rgba(240, 192, 64, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(240, 192, 64, 0);
        }
      }
      .chevron-btn {
        background: none;
        border: none;
        color: var(--text3);
        font-size: 0.75rem;
        cursor: pointer;
        transition: transform 0.22s;
        padding: 2px;
      }
      .wcard.open .chevron-btn {
        transform: rotate(180deg);
      }

      /* ─── EXAMPLES PANEL ─── */
      .ex-panel {
        display: none;
        border-top: 1px solid var(--border);
        background: var(--s3);
      }
      .wcard.open .ex-panel {
        display: block;
      }
      .ex-tabs {
        display: flex;
        overflow-x: auto;
        scrollbar-width: none;
        border-bottom: 1px solid var(--border);
      }
      .ex-tabs::-webkit-scrollbar {
        display: none;
      }
      .etab {
        padding: 8px 13px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.6rem;
        color: var(--text3);
        cursor: pointer;
        white-space: nowrap;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        background: none;
        border-left: none;
        border-right: none;
        border-top: none;
      }
      .etab:hover {
        color: var(--text2);
      }
      .etab.on {
        color: var(--gold);
        border-bottom-color: var(--gold);
      }
      .ex-body {
        padding: 15px 18px 16px;
      }
      .ex-en {
        font-size: 0.93rem;
        line-height: 1.65;
        color: var(--text);
        font-style: italic;
      }
      .ex-en b {
        color: var(--gold);
        font-style: normal;
        font-weight: 700;
      }
      .ex-es {
        margin-top: 7px;
        font-size: 0.82rem;
        color: var(--text2);
        line-height: 1.5;
        padding-left: 10px;
        border-left: 2px solid var(--border2);
      }
      .ex-foot {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 11px;
        flex-wrap: wrap;
      }
      .play-ex-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 16px;
        background: var(--s4);
        border: 1px solid var(--border2);
        color: var(--text2);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.65rem;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.3px;
      }
      .play-ex-btn:hover {
        background: var(--gold);
        border-color: var(--gold);
        color: var(--bg);
        font-weight: 600;
      }
      .play-ex-btn.playing {
        background: var(--gold);
        border-color: var(--gold);
        color: var(--bg);
      }

      /* ─── MIC BUTTON ─── */
      .mic-ex-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 16px;
        background: var(--s4);
        border: 1px solid var(--border2);
        color: var(--text2);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.65rem;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.3px;
      }
      .mic-ex-btn:hover {
        background: rgba(168, 127, 255, 0.2);
        border-color: var(--l3);
        color: var(--l3);
      }
      .mic-ex-btn.recording {
        background: rgba(248, 113, 113, 0.2);
        border-color: var(--red);
        color: var(--red);
        animation: pulse-red 0.8s infinite;
      }
      @keyframes pulse-red {
        0% {
          box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.5);
        }
        70% {
          box-shadow: 0 0 0 7px rgba(248, 113, 113, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(248, 113, 113, 0);
        }
      }
      .mic-result {
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.65rem;
        padding: 4px 10px;
        border-radius: 12px;
        border: 1px solid;
        transition: all 0.3s;
      }
      .mic-result.correct {
        color: var(--green);
        border-color: rgba(74, 222, 128, 0.3);
        background: rgba(74, 222, 128, 0.08);
      }
      .mic-result.incorrect {
        color: var(--red);
        border-color: rgba(248, 113, 113, 0.3);
        background: rgba(248, 113, 113, 0.08);
      }

      .lbl-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.58rem;
        padding: 2px 8px;
        border-radius: 10px;
        border: 1px solid var(--border2);
        color: #81ecec;
        background: rgba(129, 236, 236, 0.06);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* ─── STORY CARD ─── */
      .story-card {
        background: var(--s2);
        border: 1px solid var(--border2);
        border-radius: 14px;
        overflow: hidden;
        margin-bottom: 48px;
        position: relative;
      }
      .story-header {
        padding: 22px 28px 18px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        border-bottom: 1px solid var(--border);
      }
      .story-meta {
        flex: 1;
      }
      .story-eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.62rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text3);
        margin-bottom: 8px;
      }
      .story-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.7rem;
        font-weight: 700;
        line-height: 1.15;
        color: var(--text);
      }
      .story-title em {
        font-style: italic;
      }
      .story-tags {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .story-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.6rem;
        padding: 3px 9px;
        border-radius: 10px;
        background: var(--s3);
        border: 1px solid var(--border);
        color: var(--text3);
      }
      .story-audio-controls {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
        flex-wrap: wrap;
      }
      .play-story-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border-radius: 24px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        border: 2px solid;
        white-space: nowrap;
      }
      .play-story-btn:hover {
        transform: scale(1.02);
      }
      .play-story-btn.playing {
        animation: pulse 0.9s infinite;
      }
      .speed-btn {
        padding: 8px 12px;
        border-radius: 20px;
        background: var(--s3);
        border: 1px solid var(--border2);
        color: var(--text2);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.68rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .speed-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
      }
      .speed-btn.on {
        background: var(--gold);
        border-color: var(--gold);
        color: var(--bg);
        font-weight: 700;
      }

      .story-body {
        padding: 28px 32px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
      }
      @media (max-width: 860px) {
        .story-body {
          grid-template-columns: 1fr;
        }
      }
      .story-col-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.58rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text3);
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }
      .story-text {
        font-family: "DM Sans", sans-serif;
        font-size: 0.97rem;
        line-height: 1.9;
        color: var(--text);
      }
      .story-text .story-word {
        cursor: pointer;
        border-radius: 2px;
        transition:
          background 0.1s,
          color 0.1s;
      }
      .story-text .story-word:hover {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }
      .story-text .hw.story-word {
        color: var(--gold);
        font-weight: 700;
        border-bottom: 1px dashed rgba(240, 192, 64, 0.4);
      }
      .story-text .hw.story-word:hover {
        background: rgba(240, 192, 64, 0.15);
      }

      .story-translation {
        font-family: "DM Sans", sans-serif;
        font-size: 0.93rem;
        line-height: 1.9;
        color: var(--text2);
        font-style: italic;
      }
      .story-footer {
        padding: 16px 28px;
        border-top: 1px solid var(--border);
        background: var(--s1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .words-used {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        align-items: center;
      }
      .words-used-label {

      // Speak a single word or sentence at fixed rate (for word cards & popups)
      function speak(text, btn) {
        const clean = text.replace(/<[^>]+>/g, "");
        if (!synth) return;
        if (synth.speaking) {
          synth.cancel();
          if (activeAudioBtn) {
            activeAudioBtn.classList.remove("playing");
            activeAudioBtn = null;
          }
          if (activeAudioBtn === btn) return;
        }
        const u = new SpeechSynthesisUtterance(clean);
        u.lang = "en-US";
        u.rate = 0.85;
        const v = getVoice();
        if (v) u.voice = v;
        btn.classList.add("playing");
        activeAudioBtn = btn;
        u.onend = u.onerror = () => {
          btn.classList.remove("playing");
          activeAudioBtn = null;
        };
        synth.speak(u);

      // Build a lookup map from all word data
      const WORD_DICT = {};
      function buildWordDict() {
        // Register course words (A1, A2)
        [A1_WORDS, A2_WORDS].forEach((arr) => {
          arr.forEach(([rank, word, type, spanish, past, examples]) => {
            WORD_DICT[word.toLowerCase()] = {
              word,
              type,
              spanish,
              past,
              examples,
            };
          });
        });
        // Register advanced words (B1, B2, C1)
        [2, 3, 4].forEach((lvlId) => {
          const subLevels = getSubLevels(lvlId);
          subLevels.forEach((sl) => {
            sl.words.forEach(([rank, word, type, spanish, past, examples]) => {
              WORD_DICT[word.toLowerCase()] = {
                word,
                type,
                spanish,
                past,
                examples,
              };
            });
          });
        });
        // Register common words (fill gaps for story words not in course)
        Object.entries(COMMON_WORDS).forEach(
          ([w, [spanish, type, exEn, exEs]]) => {
            if (!WORD_DICT[w]) {
              WORD_DICT[w] = {
                word: w,
                type,
                spanish,
                past: null,
                examples: [["Ejemplo", exEn, exEs]],
              };
            }
          },
        );
      }

      let activePopup = null;

      function showWordPopup(el, wordKey) {
        closeWordPopup();
        const clean = wordKey.replace(/[^a-zA-Z']/g, "").toLowerCase();
        if (!clean) return;
        const data = WORD_DICT[clean];
        const popup = document.createElement("div");
        popup.className = "word-popup";
        popup.id = "wordPopup";

        if (data) {
          const ex = data.examples[0];
          const pastTag = data.past
            ? `<span class="tag tag-past">${data.past}</span>`
            : "";
          const exTextClean = ex[1]
            .replace(/<[^>]+>/g, "")
            .replace(/'/g, "\\'");
          popup.innerHTML = `
      <div class="word-popup-top">
        <div class="word-popup-meta">
          <div class="word-popup-word">${data.word}</div>
          <div class="word-popup-es">${data.spanish}</div>
          <div class="word-popup-tags">
            <span class="tag ${typeClass(data.type)}">${data.type}</span>${pastTag}
          </div>
        </div>
        <button class="word-popup-play" onclick="speak('${data.word.replace(/'/g, "\\'")}',this)">🔊</button>
      </div>
      <div class="word-popup-ex">
        <div class="word-popup-label">Ejemplo</div>
        <div class="word-popup-ex-en">${ex[1]}</div>
        <div class="word-popup-ex-es">${ex[2]}</div>
      </div>
      <div class="word-popup-footer">
        <button class="word-popup-ex-play" onclick="speak('${exTextClean}',this)">🔊 Escuchar</button>
      </div>`;
        } else {
          popup.innerHTML = `
      <div class="word-popup-top">
        <div class="word-popup-meta">
          <div class="word-popup-word">${wordKey}</div>
          <div class="word-popup-es" style="color:var(--text3);font-style:italic">No está en este nivel</div>
        </div>
        <button class="word-popup-play" onclick="speak('${wordKey.replace(/'/g, "\\'")}',this)">🔊</button>
      </div>`;
        }

        document.body.appendChild(popup);
        activePopup = popup;

        const rect = el.getBoundingClientRect();
        const pw = 300;
        const scrollX = window.scrollX,
          scrollY = window.scrollY;
        let left = rect.left + scrollX - 16;
        let top = rect.bottom + scrollY + 10;
        if (left + pw > document.documentElement.clientWidth - 8)
          left = document.documentElement.clientWidth - pw - 8 + scrollX;
        if (left < 8 + scrollX) left = 8 + scrollX;
        const arrowLeft = Math.max(
          10,
          Math.min(rect.left + scrollX - left + rect.width / 2 - 8, pw - 24),
        );
        popup.style.left = left + "px";
        popup.style.top = top + "px";
        popup.style.setProperty("--arrow-left", arrowLeft + "px");
      }

      function closeWordPopup() {
        if (activePopup) {
          activePopup.remove();
          activePopup = null;
        }
      }

      // Wrap every plain-text word in story with a clickable span
      function processStoryText(html) {
        // Parse the HTML, walk text nodes, wrap each word token
        const div = document.createElement("div");
        div.innerHTML = html;
        function walkNode(node) {
          if (node.nodeType === 3) {
            // text node
            const text = node.textContent;
            if (!text.trim()) return;
            // Split keeping separators
            const parts = text.split(/(\b[a-zA-Z']+\b)/g);
            if (parts.length <= 1) return;
            const frag = document.createDocumentFragment();
            parts.forEach((part) => {
              if (/^[a-zA-Z']+$/.test(part)) {
                const span = document.createElement("span");
                span.className = "story-word";
                span.textContent = part;
                frag.appendChild(span);
              } else {
                frag.appendChild(document.createTextNode(part));
              }
            });
            node.parentNode.replaceChild(frag, node);
          } else if (node.nodeType === 1) {
            // Don't re-wrap .hw spans — just add story-word to them too
            if (node.classList && node.classList.contains("hw")) {
              node.classList.add("story-word");
              return;
            }
            Array.from(node.childNodes).forEach(walkNode);
          }
        }
        Array.from(div.childNodes).forEach(walkNode);
        return div.innerHTML;
      }

      document.addEventListener("click", (e) => {
        const sw = e.target.closest(".story-word");
        if (sw) {
          e.stopPropagation();
          const word = sw.textContent.replace(/[^a-zA-Z']/g, "").trim();
          showWordPopup(sw, word);
          return;
        }
        if (activePopup && !activePopup.contains(e.target)) {
          closeWordPopup();
        }
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeWordPopup();
      });

      function playStoryById(storyElId, btnId, lvlId) {
        const el = document.getElementById(storyElId);
        const btn = document.getElementById(btnId);
        if (!el || !btn) return;
        const text = el.innerText || el.textContent;
        if (!synth) return;
        if (synth.speaking) {
          synth.cancel();
          btn.classList.remove("playing");
          btn.innerHTML = "▶ Leer historia";
          if (activeAudioBtn === btn) {
            activeAudioBtn = null;
            return;
          }
        }
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "en-US";
        u.rate = storyRates[lvlId];
        const v = getVoice();
        if (v) u.voice = v;
        btn.classList.add("playing");
        btn.innerHTML = "⏹ Detener";
        activeAudioBtn = btn;
        u.onend = u.onerror = () => {
          btn.classList.remove("playing");
          btn.innerHTML = "▶ Leer historia";
          activeAudioBtn = null;
        };
        synth.speak(u);
      }

      function toggleSpeed(spdBtnId, lvlId) {
        const btn = document.getElementById(spdBtnId);
        if (storyRates[lvlId] === 0.85) {
          storyRates[lvlId] = 1.0;
          btn.textContent = "1.0×";
          btn.classList.remove("on");
        } else if (storyRates[lvlId] === 1.0) {
          storyRates[lvlId] = 0.7;
          btn.textContent = "0.7×";
          btn.classList.add("on");
        } else {
          storyRates[lvlId] = 0.85;
          btn.textContent = "0.85×";
          btn.classList.add("on");
        }
      }

      if (synth && synth.onvoiceschanged !== undefined)
        synth.onvoiceschanged = () => {};

      // ══════════════════════════════════════════
      // MICROPHONE / SPEECH RECOGNITION
      // ══════════════════════════════════════════
      const SpeechRec =
        window.SpeechRecognition || window.webkitSpeechRecognition;
      let activeRecognition = null;
      let activeMicBtn = null;

      function startMic(btn, expectedText, resultId) {
        if (!SpeechRec) {
          alert(
            "Tu navegador no soporta reconocimiento de voz. Prueba con Chrome.",
          );
          return;
        }
        if (activeMicBtn && activeMicBtn !== btn) {
          activeMicBtn.classList.remove("recording");
          activeMicBtn.innerHTML = "🎤 Pronunciar";
          if (activeRecognition) {
            activeRecognition.stop();
            activeRecognition = null;
          }
        }
        if (btn.classList.contains("recording")) {
          btn.classList.remove("recording");
          btn.innerHTML = "🎤 Pronunciar";
          if (activeRecognition) {
            activeRecognition.stop();
            activeRecognition = null;
          }
          activeMicBtn = null;
          return;
        }
        const recognition = new SpeechRec();
        recognition.lang = "en-US";
        recognition.interimResults = false;
        recognition.maxAlternatives = 3;
        btn.classList.add("recording");
        btn.innerHTML = "⏹ Parar";
        activeMicBtn = btn;
        activeRecognition = recognition;
        recognition.start();
        recognition.onresult = (e) => {
          const results = Array.from(e.results[0]).map((r) =>
            r.transcript.toLowerCase().trim(),
          );
          const expected = expectedText
            .replace(/<[^>]+>/g, "")
            .toLowerCase()
            .trim();
          // Check if any result matches well enough
          const score = results
            .map((r) => similarity(r, expected))
            .reduce((a, b) => Math.max(a, b), 0);
          const correct =
            score > 0.55 ||
            results.some(
              (r) => expected.includes(r) || r.includes(expected.split(" ")[0]),
            );
          showMicResult(resultId, correct, results[0], expected);
          btn.classList.remove("recording");
          btn.innerHTML = "🎤 Pronunciar";
          activeMicBtn = null;
          activeRecognition = null;
        };
        recognition.onerror = recognition.onend = () => {
          btn.classList.remove("recording");
          btn.innerHTML = "🎤 Pronunciar";
          if (activeMicBtn === btn) {
            activeMicBtn = null;
            activeRecognition = null;
          }
        };
      }

      function similarity(a, b) {
        if (a === b) return 1;
        const la = a.length,
          lb = b.length;
        if (!la || !lb) return 0;
        const d = Array.from({ length: lb + 1 }, (_, i) => i);
        for (let i = 1; i <= la; i++) {
          let prev = i;
          for (let j = 1; j <= lb; j++) {
            const val =
              a[i - 1] === b[j - 1]
                ? d[j - 1]
                : 1 + Math.min(d[j - 1], d[j], prev);
            d[j - 1] = prev;
            prev = val;
          }
          d[lb] = prev;
        }
        return 1 - d[lb] / Math.max(la, lb);
      }

      function showMicResult(resultId, correct, heard, expected) {
        let el = document.getElementById(resultId);
        if (!el) return;
        el.className = "mic-result " + (correct ? "correct" : "incorrect");
        el.style.display = "flex";
        if (correct) {
          el.innerHTML = '✅ ¡Correcto! "' + heard + '"';
        } else {
          el.innerHTML = '❌ Escuché: "' + heard + '"';
        }
      }

      // ══════════════════════════════════════════
      // RENDER
      // ══════════════════════════════════════════
      function typeClass(t) {
        return (
          {
            noun: "tag-noun",
            verb: "tag-verb",
            adjective: "tag-adj",
            adverb: "tag-adv",
            function: "tag-fn",
          }[t] || "tag-fn"
        );
      }

      function renderWordCard(
        rank,
        word,
        type,
        spanish,
        past,
        examples,
        levelId,
        subIdx,
        accentHex,
      ) {
        const uid = `${levelId}-${rank}`;
        const tabs = examples
          .map(
            (e, i) =>
              `<button class="etab${i === 0 ? " on" : ""}" onclick="switchEx(this,'${uid}')" data-i="${i}">${e[0]}</button>`,
          )
          .join("");
        const slides = examples
          .map((e, i) => {
            const micId = `mic-result-${uid}-${i}`;
            const cleanText = e[1]
              .replace(/<[^>]+>/g, "")
              .replace(/'/g, "\\'")
              .replace(/"/g, "&quot;");
            const playCall = `event.stopPropagation();speakEx('${e[1].replace(/'/g, "\\'").replace(/"/g, "&quot;")}',this,'${uid}')`;
            return `
    <div class="ex-slide" data-i="${i}" style="${i > 0 ? "display:none" : ""}">
      <div class="ex-en">${e[1]}</div>
      <div class="ex-es">${e[2]}</div>
      <div class="ex-foot">
        <button class="play-ex-btn" onclick="${playCall}">🔊 Escuchar</button>
        <button class="mic-ex-btn" onclick="event.stopPropagation();startMic(this,'${cleanText}','${micId}')">🎤 Pronunciar</button>
        <span class="lbl-tag">${e[0]}</span>
      </div>
      <div class="mic-result" id="${micId}" style="display:none;margin-top:8px"></div>
    </div>`;
          })
          .join("");
        const speedRow = `
    <div class="ex-speed-row">
      <span class="ex-speed-label">Vel:</span>
      <button class="ex-spd-btn" onclick="setCardSpeed('${uid}',0.7,this)">0.7×</button>
      <button class="ex-spd-btn on" id="spd-${uid}-def" onclick="setCardSpeed('${uid}',0.85,this)">0.85×</button>
      <button class="ex-spd-btn" onclick="setCardSpeed('${uid}',1.0,this)">1.0×</button>
      <button class="ex-spd-btn" onclick="setCardSpeed('${uid}',1.2,this)">1.2×</button>
    </div>`;
        return `
  <div class="wcard" id="wc-${uid}">
    <div class="wcard-accent" style="background:${accentHex}40"></div>
    <div class="wcard-top" onclick="toggleWCard('${uid}',event)">
      <div class="wcard-info">
        <div class="wcard-word">${word}</div>
        <div class="wcard-meta">
          <span class="tag ${typeClass(type)}">${type}</span>
          ${past ? `<span class="tag tag-past">${past}</span>` : ""}
        </div>
        <div class="wcard-es">${spanish}</div>
      </div>
      <div class="wcard-right">
        <span class="rank-tag">#${rank}</span>
        <button class="waud-btn" onclick="event.stopPropagation();speak('${word}',this)" title="Pronunciar">🔊</button>
        <button class="chevron-btn" onclick="event.stopPropagation();toggleWCard('${uid}',null)">▾</button>
      </div>
    </div>
    <div class="ex-panel">
      ${speedRow}
      <div class="ex-tabs" id="etabs-${uid}">${tabs}</div>
      <div class="ex-body" id="ebody-${uid}">${slides}</div>
    </div>
  </div>`;
      }

      function renderStoryCard(
        levelId,
        subIdx,
        storyData,
        accentHex,
        levelColor,
        stIdx,
      ) {
        stIdx = stIdx || 0;
        const storyEnId = `story-en-${levelId}-${subIdx}-${stIdx}`;
        const storyBtnId = `storybtn-${levelId}-${subIdx}-${stIdx}`;
        const spdBtnId = `spd-${levelId}-${subIdx}-${stIdx}`;
        const wordPills = storyData.words
          .map((w) => `<span class="word-pill">${w}</span>`)
          .join("");
        return `
  <div class="story-card">
    <div style="height:3px;background:linear-gradient(90deg,${accentHex},${accentHex}99)"></div>
    <div class="story-header">
      <div class="story-meta">
        <div class="story-eyebrow">${storyData.eyebrow}</div>
        <div class="story-title"><em>${storyData.titleEn}</em> — ${storyData.titleEs}</div>
        <div class="story-tags">${(Array.isArray(storyData.tags) ? storyData.tags : [storyData.tags]).map((t) => `<span class="story-tag">${t}</span>`).join("")}</div>
      </div>
      <div class="story-audio-controls">
        <button class="speed-btn on" id="${spdBtnId}" onclick="toggleSpeed('${spdBtnId}',${levelId})">0.85×</button>
        <button class="play-story-btn" id="${storyBtnId}"
          style="background:${accentHex}1a;border-color:${accentHex};color:${accentHex}"
          onclick="playStoryById('${storyEnId}','${storyBtnId}',${levelId})">▶ Leer historia</button>
      </div>
    </div>
    <div class="story-body">
      <div>
        <div class="story-col-label">🇬🇧 English</div>
        <div class="story-text" id="${storyEnId}">${processStoryText(storyData.storyEn)}</div>
        <button class="story-es-toggle" style="display:none" onclick="toggleStoryEs(this,'story-es-${levelId}-${subIdx}-${stIdx}')">🇪🇸 Ver traducción</button>
      </div>
      <div>
        <div class="story-col-label">🇪🇸 Español</div>
        <div class="story-translation" id="story-es-${levelId}-${subIdx}-${stIdx}">${storyData.storyEs}</div>
      </div>
    </div>
    <div class="story-footer">
      <div class="words-used">
        <span class="words-used-label">Palabras:</span>
        ${wordPills}
      </div>
    </div>
  </div>`;
      }

      function buildPanels() {
        const container = document.getElementById("main");
        let html = "";
        LEVELS_META.forEach((lv) => {
          const subLevels = getSubLevels(lv.id);
          const subNavHtml = subLevels
            .map(
              (sl, si) =>
                `<button class="subnav-btn${si === 0 ? " active" : ""}" id="subnav-btn-${lv.id}-${si}" onclick="showSubLevel(${lv.id},${si})">` +
                `<span class="subnav-label">${lv.name}.${si + 1} · ${sl.label}</span></button>`,
            )
            .join("");
          document.getElementById(`subnav-${lv.id}`).innerHTML = subNavHtml;

          const subTabsHtml = subLevels
            .map(
              (sl, si) =>
                `<button class="slvl-tab${si === 0 ? " active" : ""}" id="sltab-${lv.id}-${si}" onclick="showSubLevel(${lv.id},${si})">` +
                `${lv.name}.${si + 1} — ${sl.label}</button>`,
            )
            .join("");

          const subPanelsHtml = subLevels
            .map((sl, si) => {
              const storyData = getStoryForSub(lv.id, si);
              const cardsHtml = sl.words
                .map(([rank, word, type, spanish, past, examples]) =>
                  renderWordCard(
                    rank,
                    word,
                    type,
                    spanish,
                    past,
                    examples,
                    lv.id,
                    si,
                    lv.accentHex,
                  ),
                )
                .join("");
              const stories = Array.isArray(storyData)
                ? storyData
                : [storyData];
              const storyCards = stories
                .map((sd, stIdx) =>
                  renderStoryCard(lv.id, si, sd, lv.accentHex, lv.color, stIdx),
                )
                .join("");
              return `
      <div class="sublevel-panel${si === 0 ? " active" : ""}" id="subpanel-${lv.id}-${si}">
        <div class="content-area">
          <div class="section-header">
            <span class="section-num">01</span>
            <span class="section-title">Vocabulario ${lv.name}.${si + 1}</span>
          </div>
          <div class="word-grid">${cardsHtml}</div>
          <div class="section-header" style="margin-top:8px">
            <span class="section-num">02</span>
            <span class="section-title">Historia${stories.length > 1 ? "s" : ""} de Lectura · ${lv.name}.${si + 1}</span>
          </div>
          ${storyCards}
        </div>
      </div>`;
            })
            .join("");

          const mobilePillNav = `<div class="mobile-sublevel-nav" id="mpill-${lv.id}">
      ${subLevels.map((sl, si) => `<button class="msln-pill${si === 0 ? " active" : ""}" id="mpill-${lv.id}-${si}" onclick="showSubLevel(${lv.id},${si})">${lv.name}.${si + 1} · ${sl.label}</button>`).join("")}
    </div>`;

          html += `
    <div class="level-panel${lv.id === 0 ? " active" : ""}" id="panel-${lv.id}">
      <div class="level-hero" style="background:linear-gradient(135deg,${lv.accentHex}0a 0%,transparent 60%)">
        <div style="position:absolute;top:-80px;right:-60px;width:320px;height:320px;background:${lv.accentHex};border-radius:50%;opacity:.05;filter:blur(70px)"></div>
        <div class="level-badge" style="color:${lv.accentHex};border-color:${lv.accentHex}4d;background:${lv.accentHex}0f">
          ● ${lv.name} — ${lv.label.toUpperCase()}
        </div>
        <div class="level-title">${lv.total} palabras · ${subLevels.length} sub-niveles</div>
        <div class="level-desc">Aprende en grupos de 25 palabras. Toca cualquier palabra de la historia para ver su significado.</div>
        <div class="level-meta">
          <div class="meta-item"><span>📚</span> ${lv.total} palabras</div>
          <div class="meta-item"><span>📖</span> ${subLevels.length} historias</div>
          <div class="meta-item"><span>🔊</span> Audio ajustable</div>
          <div class="meta-item"><span>🎤</span> Pronunciación</div>
        </div>
      </div>
      ${mobilePillNav}
      <div class="sublevel-tabs" id="sltabs-${lv.id}">${subTabsHtml}</div>
      ${subPanelsHtml}
    </div>`;
        });
        container.innerHTML = html;
      }

      function toggleWCard(uid, event) {
        // Don't toggle if clicked on a button inside the card top
        if (event && event.target && event.target.closest("button")) return;
        const card = document.getElementById(`wc-${uid}`);
        if (card) card.classList.toggle("open");
      }

      function switchEx(btn, uid) {
        const idx = parseInt(btn.dataset.i);
        document
          .querySelectorAll(`#etabs-${uid} .etab`)
          .forEach((t) => t.classList.remove("on"));
        btn.classList.add("on");
        document
          .querySelectorAll(`#ebody-${uid} .ex-slide`)
          .forEach((s, i) => (s.style.display = i === idx ? "block" : "none"));
      }

      // ══════════════════════════════════════════
      // NAVIGATION
      // ══════════════════════════════════════════
      let currentLevel = 0;
      let currentSubLevels = [0, 0, 0, 0, 0];

      function showLevel(id) {
        document
          .querySelectorAll(".level-panel")
          .forEach((p) => p.classList.remove("active"));
        document
          .querySelectorAll(".nav-level-btn")
          .forEach((b) => b.classList.remove("active"));
        document
          .querySelectorAll(".subnav")
          .forEach((s) => s.classList.remove("open"));
        document.getElementById(`panel-${id}`).classList.add("active");
        document.getElementById(`navbtn-${id}`).classList.add("active");
        document.getElementById(`subnav-${id}`).classList.add("open");
        currentLevel = id;
        window.scrollTo({ top: 0, behavior: "smooth" });
        if (window.innerWidth <= 768) {
          document.getElementById("sidebar").classList.remove("open");
          document.getElementById("overlay").style.display = "none";
        }
      }

      function showSubLevel(levelId, subIdx) {
        document
          .querySelectorAll(`#panel-${levelId} .sublevel-panel`)
          .forEach((p) => p.classList.remove("active"));
        document
          .querySelectorAll(`#sltabs-${levelId} .slvl-tab`)
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(`#subnav-${levelId} .subnav-btn`)
          .forEach((b) => b.classList.remove("active"));
        document
          .getElementById(`subpanel-${levelId}-${subIdx}`)
          .classList.add("active");
        const sltab = document.getElementById(`sltab-${levelId}-${subIdx}`);
        if (sltab) sltab.classList.add("active");
        const snBtn = document.getElementById(
          `subnav-btn-${levelId}-${subIdx}`,
        );
        if (snBtn) snBtn.classList.add("active");
        // Mobile pill nav
        document
          .querySelectorAll(`#mpill-${levelId} .msln-pill`)
          .forEach((p) => p.classList.remove("active"));
        const mpill = document.getElementById(`mpill-${levelId}-${subIdx}`);
        if (mpill) mpill.classList.add("active");
        currentSubLevels[levelId] = subIdx;
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function toggleMenu() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");
        sidebar.classList.toggle("open");
        overlay.style.display = sidebar.classList.contains("open")
          ? "block"
          : "none";
      }

      // ══════════════════════════════════════════
      // MOBILE BOTTOM NAV
      // ══════════════════════════════════════════
      let mbnState = "home";

      function mbnTab(tab) {
        mbnState = tab;
        document
          .querySelectorAll(".mbn-btn")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById(`mbn-${tab}`)?.classList.add("active");

        if (tab === "vocab" || tab === "story") {
          // Scroll to the relevant section in the active panel
          const activeSub = currentSubLevels[currentLevel];
          const panelEl = document.getElementById(
            `subpanel-${currentLevel}-${activeSub}`,
          );
          if (!panelEl) return;
          const selector = tab === "vocab" ? ".word-grid" : ".story-card";
          const target = panelEl.querySelector(selector);
          if (target) {
            target.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        } else if (tab === "home") {
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      }

      function openMobileSearch() {
        const el = document.getElementById("mobileSearch");
        el.classList.add("open");
        setTimeout(() => document.getElementById("msInput").focus(), 100);
      }

      function closeMobileSearch() {
        document.getElementById("mobileSearch").classList.remove("open");
        document.getElementById("msInput").value = "";
        document.getElementById("msResults").innerHTML =
          '<div class="ms-empty">Escribe para buscar entre las 1000 palabras del curso</div>';
      }

      function runSearch(q) {
        const container = document.getElementById("msResults");
        q = q.trim().toLowerCase();
        if (q.length < 2) {
          container.innerHTML =
            '<div class="ms-empty">Escribe al menos 2 letras para buscar</div>';
          return;
        }
        const results = [];
        Object.entries(WORD_DICT).forEach(([key, data]) => {
          if (key.startsWith(q) || data.spanish.toLowerCase().includes(q)) {
            results.push({ key, ...data });
          }
        });
        results.sort((a, b) => a.word.localeCompare(b.word));
        if (!results.length) {
          container.innerHTML =
            '<div class="ms-empty">No se encontraron resultados</div>';
          return;
        }
        container.innerHTML = results
          .slice(0, 40)
          .map((d) => {
            const tc = typeClass(d.type);
            const wSafe = (d.word || "").replace(/'/g, "\\'");
            return `<div class="ms-result-item" onclick="showSearchWord('${wSafe}')">
      <div style="flex:1">
        <div class="ms-result-word">${d.word}</div>
        <div class="ms-result-es">${d.spanish}</div>
      </div>
      <span class="ms-result-tag tag ${tc}">${d.type}</span>
      <button class="ms-audio-btn" onclick="event.stopPropagation();speak('${wSafe}',this)">🔊</button>
    </div>`;
          })
          .join("");
      }

      function showSearchWord(word) {
        closeMobileSearch();
        // Show popup for the word
        setTimeout(() => {
          const dummy = document.createElement("span");
          dummy.style.cssText =
            "position:fixed;left:50%;bottom:80px;width:1px;height:1px;";
          document.body.appendChild(dummy);
          showWordPopup(dummy, word);
          setTimeout(() => dummy.remove(), 100);
        }, 150);
      }

      // Story ES toggle for mobile
      function toggleStoryEs(btn, storyId) {
        const el = document.getElementById(storyId);
        if (!el) return;
        const visible = el.classList.toggle("visible");
        btn.innerHTML = visible ? "🇪🇸 Ocultar traducción" : "🇪🇸 Ver traducción";
      }

      // ══════════════════════════════════════════
      // INIT
      // ══════════════════════════════════════════
      buildPanels();
      buildWordDict();
    </script>
  </body>
</html>
